<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SalesMafia Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:#07101F;color:#ECF0FF;min-height:100vh}
button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer}
input,select{-webkit-appearance:none;appearance:none;font-family:inherit}

/* LOGIN */
#pg-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column}
.login-card{background:#131F35;border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:28px;width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.logo-mark{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,#C9A84C,#6E5520);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#07101F}
.logo-text{font-size:18px;font-weight:900}
.logo-text em{color:#C9A84C;font-style:normal}
.logo-text small{display:block;font-size:10px;color:#5D7499;letter-spacing:.08em;text-transform:uppercase}
h2{font-size:18px;font-weight:800;margin-bottom:4px}
.sub{font-size:12px;color:#5D7499;margin-bottom:20px}
.chip-box{background:#0B1526;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:12px;margin-bottom:18px}
.chip-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6E5520;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 14px;border-radius:7px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,0.1);background:#1A2A42;color:#ECF0FF}
.chip-sp{border-color:#C9A84C;color:#C9A84C}
.chip-mgr{border-color:#4A90E2;color:#4A90E2}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#5D7499;margin-bottom:5px}
.field input{display:block;width:100%;background:#0B1526;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:12px;font-size:14px;color:#ECF0FF;outline:none}
.field input:focus{border-color:#C9A84C}
.btn-gold{width:100%;background:linear-gradient(135deg,#C9A84C,#6E5520);border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:800;color:#07101F}
.err{color:#E53935;font-size:12px;text-align:center;margin-top:10px;min-height:16px;font-weight:600}

/* APP */
#pg-app{display:none;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:#131F35;border-bottom:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50}
.tb-brand{font-size:14px;font-weight:900}
.tb-brand em{color:#C9A84C;font-style:normal}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-info{text-align:right}
.tb-name{font-size:11px;font-weight:700}
.tb-role{font-size:9px;color:#C9A84C;text-transform:uppercase;letter-spacing:.06em}
.tb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#6E5520);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#07101F}
.btn-out{padding:5px 10px;border-radius:6px;background:transparent;border:1px solid rgba(255,255,255,0.08);font-size:10px;color:#5D7499}

.body-wrap{display:flex;flex:1}

/* SIDEBAR */
.sidebar{width:188px;flex-shrink:0;background:#131F35;border-right:1px solid rgba(201,168,76,0.12);display:flex;flex-direction:column;padding:10px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.ns{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6E5520;padding:12px 14px 4px}
.nl{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:12px;font-weight:500;color:#5D7499;border:none;background:transparent;width:100%;text-align:left;border-left:2px solid transparent}
.nl.on{color:#C9A84C;border-left-color:#C9A84C;background:rgba(201,168,76,0.06)}
.ni{font-size:13px;width:16px;text-align:center}
.nbadge{margin-left:auto;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;padding:0 4px}
.nb-r{background:#E53935;color:#fff}
.nb-b{background:#4A90E2;color:#fff}
.goal-box{margin:14px 10px;background:#0B1526;border:1px solid rgba(201,168,76,0.14);border-radius:8px;padding:11px}
.goal-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6E5520;margin-bottom:5px}
.goal-bar{height:5px;background:#223250;border-radius:3px;overflow:hidden;margin:4px 0}
.goal-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#C9A84C,#E2C46A)}
.goal-nums{display:flex;justify-content:space-between}
.goal-cur{font-size:13px;color:#C9A84C;font-weight:600}
.goal-tgt{font-size:10px;color:#5D7499}

/* MAIN */
.main{flex:1;padding:20px;overflow-y:auto;min-width:0}

/* PAGE */
.pg-ey{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#C9A84C;margin-bottom:3px}
.pg-t{font-size:20px;font-weight:900;margin-bottom:2px}
.pg-s{font-size:11px;color:#5D7499;margin-bottom:18px}

/* KPIS */
.krow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.kc{background:#131F35;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;flex:1;min-width:130px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kc-gold::before{background:#C9A84C}.kc-green::before{background:#2ECC71}.kc-blue::before{background:#4A90E2}.kc-orange::before{background:#E67E22}.kc-red::before{background:#E53935}
.kl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#5D7499;margin-bottom:4px}
.kv{font-size:20px;font-weight:700}
.kv-gold{color:#C9A84C}.kv-green{color:#2ECC71}.kv-blue{color:#4A90E2}.kv-orange{color:#E67E22}.kv-red{color:#E53935}
.kn{font-size:10px;color:#5D7499;margin-top:4px}

/* PANEL */
.panel{background:#131F35;border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;margin-bottom:16px}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.pt{font-size:13px;font-weight:700}
.pa{font-size:10px;font-weight:700;color:#C9A84C;padding:3px 8px;background:rgba(201,168,76,0.08);border-radius:5px;border:none;background:rgba(201,168,76,0.08)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#6E5520;padding:8px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.07);background:#0B1526}
.tbl td{padding:10px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tscroll{overflow-x:auto}

/* STATUS */
.s{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase}
.s-issued{background:rgba(46,204,113,0.14);color:#2ECC71}
.s-pending{background:rgba(74,144,226,0.14);color:#4A90E2}
.s-submitted{background:rgba(201,168,76,0.14);color:#C9A84C}
.s-requirements{background:rgba(230,126,34,0.14);color:#E67E22}
.s-lapse{background:rgba(229,57,53,0.14);color:#E53935}

/* ACTIVITY */
.ai{display:flex;align-items:center;gap:9px;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,0.03)}
.ai:last-child{border-bottom:none}
.ad{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.at{font-size:11px;color:#5D7499;flex:1}
.at strong{color:#ECF0FF}

/* REQ */
.ri{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer}
.ri:last-child{border-bottom:none}
.ric{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ric-or{background:rgba(230,126,34,0.14)}.ric-re{background:rgba(229,57,53,0.14)}.ric-bl{background:rgba(74,144,226,0.14)}.ric-gr{background:rgba(46,204,113,0.14)}
.rb{flex:1}
.rt{font-size:12px;font-weight:700}
.rc{font-size:10px;color:#5D7499;margin-top:1px}
.rd{font-size:10px;color:#5D7499;margin-top:3px;line-height:1.5}
.rdue{font-size:10px;margin-top:4px}
.du{color:#E53935}.ds{color:#E67E22}.do{color:#5D7499}

/* BUTTONS */
.btn-sm{padding:5px 10px;border-radius:5px;font-size:9px;font-weight:800;border:none;text-transform:uppercase;letter-spacing:.04em}
.btn-v{background:#1A2A42;color:#ECF0FF}
.btn-a{background:rgba(230,126,34,0.13);color:#E67E22;border:1px solid rgba(230,126,34,0.25)}
.btn-pr{background:linear-gradient(135deg,#C9A84C,#6E5520);border:none;border-radius:7px;padding:8px 14px;font-size:11px;font-weight:700;color:#07101F}
.btn-gh{background:#1A2A42;border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:7px 12px;font-size:11px;font-weight:600;color:#5D7499}

/* ORG */
.org-lv{margin-bottom:22px}
.org-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6E5520;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.org-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}
.org-row{display:flex;flex-wrap:wrap;gap:10px}
.org-node{background:#1A2A42;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;flex:1;min-width:170px;position:relative;overflow:hidden;cursor:pointer}
.org-node::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.on-gold::before{background:#C9A84C}.on-blue::before{background:#4A90E2}.on-green::before{background:#2ECC71}.on-orange::before{background:#E67E22}.on-red::before{background:#E53935}.on-purple::before{background:#8E44AD}
.on-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.on-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;flex-shrink:0;color:#07101F}
.av-gold{background:linear-gradient(135deg,#C9A84C,#6E5520)}.av-blue{background:linear-gradient(135deg,#4A90E2,#2980B9)}.av-green{background:linear-gradient(135deg,#2ECC71,#27AE60)}.av-orange{background:linear-gradient(135deg,#F0A500,#E67E22)}.av-red{background:linear-gradient(135deg,#FF6B6B,#E53935);color:#fff}.av-purple{background:linear-gradient(135deg,#C39BD3,#8E44AD);color:#fff}
.on-name{font-size:12px;font-weight:700}
.on-role{font-size:9px;color:#C9A84C;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.on-stats{display:flex;gap:5px;margin-bottom:9px}
.on-stat{background:#0B1526;border-radius:5px;padding:5px 7px;flex:1;text-align:center}
.on-sv{font-size:11px;font-weight:600}
.on-sl{font-size:8px;color:#5D7499;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.on-bar{height:4px;background:#223250;border-radius:2px;overflow:hidden;margin-bottom:4px}
.on-fill{height:100%;border-radius:2px}
.on-pct{font-size:9px;color:#5D7499}

/* COMM */
.crow{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,0.03);flex-wrap:wrap}
.crow:last-child{border-bottom:none}

/* TWO COL */
.two-col{display:flex;flex-wrap:wrap;gap:14px}
.two-col .panel{flex:1;min-width:280px}

/* MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(4,8,18,0.92);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:#131F35;border:1px solid rgba(201,168,76,0.15);border-radius:14px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:22px;position:relative}
.mx{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:#1A2A42;border:none;color:#5D7499;font-size:15px;display:flex;align-items:center;justify-content:center}
.mey{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C9A84C;margin-bottom:4px}
.mt{font-size:17px;font-weight:800;margin-bottom:2px}
.ms{font-size:11px;color:#5D7499;margin-bottom:14px}
.msec{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6E5520;margin:14px 0 7px}
.ig{display:flex;flex-wrap:wrap;gap:10px}
.ig-it{flex:1;min-width:120px}
.ig-k{font-size:9px;color:#5D7499;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ig-v{font-size:12px;font-weight:600}
.ig-v-gold{color:#C9A84C}.ig-v-green{color:#2ECC71}.ig-v-orange{color:#E67E22}.ig-v-red{color:#E53935}
.tl-it{display:flex;gap:9px;padding:6px 0}
.tl-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;margin-top:2px;border:2px solid #223250;background:#0B1526;color:#5D7499}
.tl-done{background:#2ECC71;border-color:#2ECC71;color:#07101F}
.tl-active{border-color:#C9A84C;color:#C9A84C}
.doc-row{display:flex;align-items:center;gap:9px;background:#0B1526;border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:10px 12px;margin-bottom:6px}
.doc-ic{font-size:18px}
.doc-inf{flex:1}
.doc-n{font-size:12px;font-weight:600}
.doc-d{font-size:10px;color:#5D7499;margin-top:1px}
.doc-btn{padding:5px 12px;border-radius:5px;font-size:10px;font-weight:700;border:none}
.db-dl{background:#4A90E2;color:#fff}.db-sg{background:#2ECC71;color:#07101F}.db-cl{background:#E67E22;color:#fff}.db-vw{background:#223250;color:#ECF0FF}.db-up{background:#C9A84C;color:#07101F}

/* ADMIN */
.atabs{display:flex;flex-wrap:wrap;gap:3px;background:#1A2A42;padding:3px;border-radius:8px;margin-bottom:18px}
.atab{padding:7px 13px;border-radius:6px;font-size:11px;font-weight:700;border:none;background:transparent;color:#5D7499}
.atab.on{background:#C9A84C;color:#07101F}
.warn{background:rgba(230,126,34,0.08);border:1px solid rgba(230,126,34,0.2);border-radius:8px;padding:12px 14px;font-size:12px;color:#E67E22;line-height:1.6;margin-bottom:16px}
.a-card{background:#1A2A42;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px;margin-bottom:12px}
.a-card-t{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.arow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.arow:last-child{border-bottom:none}
.albl{font-size:11px;font-weight:600;color:#ECF0FF;width:120px;flex-shrink:0}
.ain{display:block;background:#0B1526;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:9px 11px;font-size:12px;color:#ECF0FF;font-family:inherit;outline:none;flex:1;min-width:100px}
.ain:focus{border-color:#C9A84C}
.asel{display:block;background:#0B1526;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:9px 11px;font-size:12px;color:#ECF0FF;font-family:inherit;outline:none;flex:1}
.frow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.fcol{flex:1;min-width:130px}
.fcol label{display:block;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#5D7499;margin-bottom:5px}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:14px 0}
.int-card{background:#0B1526;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.int-ic{font-size:24px;flex-shrink:0}
.int-inf{flex:1}
.int-n{font-size:13px;font-weight:700}
.int-d{font-size:11px;color:#5D7499;margin-top:2px}
.st{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0}
.st-ok{background:rgba(46,204,113,0.14);color:#2ECC71}
.st-no{background:rgba(229,57,53,0.14);color:#E53935}
.st-pd{background:rgba(201,168,76,0.14);color:#C9A84C}
.bt{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.bt-sp{background:rgba(201,168,76,0.15);color:#C9A84C}
.bt-mgr{background:rgba(74,144,226,0.15);color:#4A90E2}
.bt-ag{background:rgba(46,204,113,0.12);color:#2ECC71}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#131F35;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:10px 18px;font-size:12px;font-weight:600;white-space:nowrap;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

function saveAgent(id){
  var a=AG[id]; if(!a) return;
  var n=document.getElementById('an-'+id);
  var r=document.getElementById('ar-'+id);
  var m=document.getElementById('amgr-'+id);
  var t=document.getElementById('atier-'+id);
  var cl=document.getElementById('aclvl-'+id);
  if(n&&n.value.trim()) a.n=n.value.trim();
  if(r&&r.value.trim()) a.role=r.value.trim();
  if(m) a.mgr=m.value||null;
  if(t) a.tier=t.value;
  if(cl) a.compLevel=cl.value;
  var pts=a.n.split(' '); a.ini='';
  for(var i=0;i<pts.length&&a.ini.length<2;i++) if(pts[i]) a.ini+=pts[i][0].toUpperCase();

  rAdmin();
}

function addPolicy(){
  var aid=document.getElementById('ap-ag').value;
  var cl=document.getElementById('ap-cl').value.trim();
  var ca=document.getElementById('ap-ca').value;
  var pr=document.getElementById('ap-pr').value.trim()||'Policy';
  var ap=parseInt(document.getElementById('ap-ap').value)||0;
  var st=document.getElementById('ap-st').value;
  if(!aid||!cl||!ap){toast('Fill in agent, client, and premium');return;}
  var mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var td=new Date();
  var nid='pol'+Date.now();
  if(!POL[aid]) POL[aid]=[];
  POL[aid].push({id:nid,cl:cl,ca:ca,pr:pr,ap:ap,dt:mos[td.getMonth()]+' '+td.getDate(),st:st});
  if(st==='issued'&&AG[aid]) AG[aid].cur+=ap;
  document.getElementById('ap-cl').value='';
  document.getElementById('ap-ap').value='';
  var rate=getCompRate(aid,ca);
  var earned=calcComm(ap,rate);
  toast('Policy added for '+cl+' — '+AG[aid].n+' earns '+fmt(earned)+' at '+rate+'%');
}

function updatePol(){
  var aid=document.getElementById('up-ag').value;
  var pid=document.getElementById('up-pol').value;
  var st=document.getElementById('up-st').value;
  if(!aid||!pid){toast('Select agent and policy');return;}
  var p=POL[aid]||[];
  for(var i=0;i<p.length;i++){
    if(p[i].id===pid){
      var oldSt=p[i].st;
      p[i].st=st;
      if(st==='issued'&&oldSt!=='issued') AG[aid].cur+=p[i].ap;
      if(oldSt==='issued'&&st!=='issued') AG[aid].cur-=p[i].ap;
      toast('Updated to: '+sl(st));
      return;
    }
  }
  toast('Policy not found');
}

  var pols=getPols(CU.id), pol=null;
  for(var i=0;i<pols.length;i++) if(pols[i].id===pid){pol=pols[i];break;}
  if(!pol) return;
  var steps=['Submitted','Under Review','Approved','Commission Released'];
  var dm={issued:[1,1,1,1],pending:[1,1,0,0],submitted:[1,0,0,0],requirements:[1,1,0,0],lapse:[1,1,0,0]};
  var fl=dm[pol.st]||[1,0,0,0];
  var rate=getCompRate(CU.id,pol.ca);
  var earned=calcComm(pol.ap,rate);
  var h='<div class="mey">'+pol.ca+' · '+pol.pr+'</div>';
  h+='<div class="mt">'+pol.cl+'</div>';
  h+='<div class="ms">Ann. Premium: <span style="color:#C9A84C;font-weight:700">'+fmt(pol.ap)+'</span> · Submitted '+pol.dt+'</div>';
  if(pol.st==='issued'){
    h+='<div style="background:rgba(46,204,113,0.07);border:1px solid rgba(46,204,113,0.15);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">';
    h+='<div style="font-size:20px">💰</div>';
    h+='<div><div style="font-size:12px;font-weight:700;color:#2ECC71">Commission Earned</div>';
    h+='<div style="font-size:18px;font-weight:800;color:#2ECC71">'+fmt(earned)+'</div>';
    h+='<div style="font-size:10px;color:#5D7499">'+AG[CU.id].compLevel+' rate: '+rate+'% of '+fmt(pol.ap)+'</div></div></div>';
  }
  h+='<div class="msec">Status Timeline</div>';
  for(var i=0;i<steps.length;i++){
    var dn=fl[i];
    var doneCt=0; for(var j=0;j<fl.length;j++) if(fl[j]) doneCt++;
    h+='<div class="tl-it"><div class="tl-dot'+(dn?' tl-done':(i===doneCt?' tl-active':''))+'">'+(dn?'OK':'')+'</div>';
    h+='<div><div style="font-size:12px">'+steps[i]+'</div>';
    h+='<div style="font-size:10px;color:#5D7499">'+(dn?'Complete':(pol.st==='requirements'&&i===2?'Requirements pending':'Pending'))+'</div></div></div>';
  }
  h+='<div class="msec">Policy Details</div>';
  h+='<div class="ig"><div class="ig-it"><div class="ig-k">Carrier</div><div class="ig-v">'+pol.ca+'</div></div>';
  h+='<div class="ig-it"><div class="ig-k">Product</div><div class="ig-v">'+pol.pr+'</div></div>';
  h+='<div class="ig-it"><div class="ig-k">Ann. Premium</div><div class="ig-v ig-v-gold">'+fmt(pol.ap)+'</div></div>';
  h+='<div class="ig-it"><div class="ig-k">Your Rate</div><div class="ig-v" style="color:#4A90E2">'+rate+'% ('+AG[CU.id].compLevel+')</div></div>';
  h+='<div class="ig-it"><div class="ig-k">Status</div><div class="ig-v '+(pol.st==='issued'?'ig-v-green':pol.st==='lapse'?'ig-v-red':'ig-v-orange')+'">'+pol.st.toUpperCase()+'</div></div>';
  h+='<div class="ig-it"><div class="ig-k">Est. Commission</div><div class="ig-v ig-v-gold">'+fmt(earned)+'</div></div></div>';
  h+='<div class="msec">Documents</div>';
  h+='<div class="doc-row"><div class="doc-ic">📄</div><div class="doc-inf"><div class="doc-n">Application Copy</div><div class="doc-d">Submitted PDF</div></div><button type="button" class="doc-btn db-vw" onclick="toast('Opening...')">View</button></div>';
  if(pol.st!=='issued') h+='<div class="doc-row"><div class="doc-ic">✍️</div><div class="doc-inf"><div class="doc-n">Resend E-Signature</div><div class="doc-d">Resend DocuSign to client</div></div><button type="button" class="doc-btn db-sg" onclick="toast('DocuSign resent!')">Resend</button></div>';
  if(pol.st==='issued') h+='<div class="doc-row"><div class="doc-ic">📜</div><div class="doc-inf"><div class="doc-n">Policy Certificate</div><div class="doc-d">Ready to deliver to client</div></div><button type="button" class="doc-btn db-dl" onclick="toast('Downloading...')">Download</button></div>';
  $$('modal-body').innerHTML=h;
  $$('modal').className='modal-bg open';
}

function oReq(rid){
  var reqs=getReqs(CU.id), r=null;
  for(var i=0;i<reqs.length;i++) if(reqs[i].id===rid){r=reqs[i];break;}
  if(!r) return;
  var ds={
    doc:[{ic:'📥',n:'Download Required Form',d:'Pre-filled carrier form',cls:'db-dl',msg:'Downloading...'}],
    med:[{ic:'📥',n:'Download Medical Release',d:'HIPAA authorization for records',cls:'db-dl',msg:'Downloading...'},{ic:'📤',n:'Upload Records',d:'Upload completed records',cls:'db-up',msg:'Upload dialog...'}],
    id:[{ic:'📤',n:'Upload Photo ID',d:'Clear front and back of state ID',cls:'db-up',msg:'Upload dialog...'}],
    sign:[{ic:'✍️',n:'Resend E-Signature',d:'Send DocuSign via email and SMS',cls:'db-sg',msg:'DocuSign resent!'},{ic:'📞',n:'Call Client',d:'Walk client through signing on phone',cls:'db-cl',msg:'Calling...'}]
  };
  var docs=ds[r.dt]||ds['doc'];
  var h='<div class="mey">Requirement</div><div class="mt">'+r.ic+' '+r.t+'</div><div class="ms">'+r.cl+'</div>';
  h+='<div style="background:rgba(230,126,34,0.07);border:1px solid rgba(230,126,34,0.16);border-radius:8px;padding:12px;margin-bottom:14px">';
  h+='<div style="font-size:12px;line-height:1.6">'+r.d+'</div>';
  h+='<div class="rdue '+r.duec+'" style="font-size:10px;margin-top:6px">'+r.due+'</div></div>';
  h+='<div class="msec">Actions &amp; Documents</div>';
  for(var i=0;i<docs.length;i++){
    var d=docs[i];
    h+='<div class="doc-row"><div class="doc-ic">'+d.ic+'</div><div class="doc-inf"><div class="doc-n">'+d.n+'</div><div class="doc-d">'+d.d+'</div></div><button type="button" class="doc-btn '+d.cls+'" onclick="toast(''+d.msg+'')">Go</button></div>';
  }
  h+='<div class="doc-row"><div class="doc-ic">💬</div><div class="doc-inf"><div class="doc-n">Message Manager</div><div class="doc-d">Flag this to your manager for help</div></div><button type="button" class="doc-btn db-cl" onclick="toast('Manager notified!')">Send</button></div>';
  h+='<button type="button" class="btn-pr" style="width:100%;padding:12px;font-size:13px;margin-top:12px" onclick="toast('Marked complete!');cModal()">Mark Complete</button>';
  $$('modal-body').innerHTML=h;
  $$('modal').className='modal-bg open';
}


function cModal(){$$('modal').className='modal-bg';}
$$('modal').addEventListener('click',function(e){if(e.target===this)cModal();});

// ── TOAST ──
var TT;
function toast(msg){
  var el=$$('toast');
  el.innerHTML=msg;
  el.className='toast show';
  clearTimeout(TT);
  TT=setTimeout(function(){el.className='toast';},3000);
}

// ── KEYBOARD ──
$$('f-pw').addEventListener('keyup',function(e){if(e.keyCode===13)doLogin();});
document.addEventListener('keyup',function(e){if(e.keyCode===27)cModal();});
</script>
